# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none
# reload config
bind=SUPER,r,reload_config

# menu,terminal & apps
bind=SUPER,Return,spawn, ghostty
bind=SUPER,e,spawn, kitty -e yazi
bind=SUPER,d,spawn, rofi -display-drun "" -show drun -matching fuzzy -theme ~/.config/rofi/themes/drun.rasi -show-icons
bind=SUPER,m,spawn, rofi -show calc -display-calc "󱖦" -theme ~/.config/rofi/themes/drun.rasi
# bind=SUPER,d,spawn, ghostty --title launcher -e fsel --detach
# bind=SUPER,i,spawn, /home/duck/.config/rofi/wallpaperSelect.sh
bind=SUPER,i,spawn_shell,echo "toggle" | socat - UNIX-CONNECT:$HOME/.config/quickshell/wallpaper.sock
bind=SUPER,x,spawn, /home/duck/.config/wlogout/wlogoutmango.sh
bind=SUPER,n,spawn, swaync-client -t
bind=SUPER,t,spawn, kitty --title tomato -e tomato
# bind=SUPER,p,spawn, hyprshot -m region -o Screenshots -z
bind=SUPER,p,spawn,msnap gui
bind=SUPER,Print,spawn, hyprshot -m region -o Screenshots -z
bind=SUPER,c,spawn_shell, cliphist list | rofi -dmenu -matching fuzzy -i -p "󰅌" -theme ~/.config/rofi/themes/drun.rasi -show-icons | cliphist decode | wl-copy
bind=ALT,c,spawn, cliphist wipe
bind=SUPER+SHIFT,o,spawn,mmsg -d toggle_monitor HDMI-A-1
# exit
bind=SUPER+SHIFT, e,quit,
bind=SUPER+SHIFT, q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Gestures
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# layouts
bind=SUPER+SHIFT,t,setlayout,tile
bind=SUPER+SHIFT,s,setlayout,scroller
bind=SUPER+SHIFT,m,setlayout,monocle
bind=SUPER+SHIFT,g,setlayout,tgmix
bind=SUPER+SHIFT,d,setlayout,deck
bind=SUPER+SHIFT,c,setlayout,center_tile
bind=SUPER+SHIFT,v,setlayout,vertical_scroller

# switch window status
bind=SUPER,g,toggleglobal
bind=ALT,Tab,toggleoverview
bind=SUPER,space,togglefloating
bind=SUPER,a,togglemaximizescreen
bind=ALT,f,togglefullscreen
bind=ALT,i,minimized
bind=SUPER,o,toggleoverlay
bind=ALT+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt,Left,scroller_stack,left
bind=alt,Right,scroller_stack,right
bind=alt,Up,scroller_stack,up
bind=alt,Down,scroller_stack,down

# switch layout
bind=SUPER+SHIFT,n,switch_layout

# tag switch
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=Alt,1,tagsilent,1
bind=Alt,2,tagsilent,2
bind=Alt,3,tagsilent,3
bind=Alt,4,tagsilent,4
bind=Alt,5,tagsilent,5
bind=Alt,6,tagsilent,6
bind=Alt,7,tagsilent,7
bind=Alt,8,tagsilent,8
bind=Alt,9,tagsilent,9
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# combo view: multiple tags together
bind=ALT+SHIFT,1,toggletag,1
bind=ALT+SHIFT,2,toggletag,2
bind=ALT+SHIFT,3,toggletag,3
bind=ALT+SHIFT,4,toggletag,4
bind=ALT+SHIFT,5,toggletag,5
bind=ALT+SHIFT,6,toggletag,6
bind=ALT+SHIFT,7,toggletag,7
bind=ALT+SHIFT,8,toggletag,8
bind=ALT+SHIFT,9,toggletag,9

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Audio
bind=NONE,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn_shell,wpctl set-mute @DEFAULT_SINK@ toggle

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn_shell,ddcutil setvcp 10 + 10
bind=NONE,XF86MonBrightnessDown,spawn_shell,ddcutil setvcp 10 - 10


# bind = super, m, setlayout, manual_tile

# bind = alt+shift, v, set_manual_vertical
# bind = alt+shift, h, set_manual_horizontal
