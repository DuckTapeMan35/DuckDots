source=~/.config/mango/colors.conf
source=~/.config/mango/keybinds.conf
source=~/.config/mango/decorations.conf
source=~/.config/mango/rules.conf

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mango
exec-once = wl-paste --watch cliphist store &
exec-once = wl-clip-persist --clipboard regular --reconnect-tries 0 &
exec-once = mpd

# Scroller layout settings
scroller_focus_center=1
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_default_proportion=1.0
scroller_proportion_preset=0.5,0.8,1.0
scroller_structs=0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
# hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
cursor_theme=breeze_cursors
drag_tile_to_tile=1
view_current_to_back=1
syncobj_enable = 1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# autostart
exec-once=bash ~/.config/mango/autostart.sh
